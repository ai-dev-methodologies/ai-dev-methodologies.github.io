<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none"><rect width="1200" height="420" rx="24" fill="#FFFDF7"/><rect x="40" y="70" width="250" height="110" rx="18" fill="#18181B"/><text x="70" y="115" fill="#FAFAFA" font-family="IBM Plex Sans, sans-serif" font-size="22" font-weight="700">긴 대화 세션</text><text x="70" y="150" fill="#D4D4D8" font-family="IBM Plex Sans, sans-serif" font-size="18">맥락 누적 / 실패 흔적 / 잡음</text><path d="M310 125H420" stroke="#EC4899" stroke-width="6" stroke-linecap="round"/><path d="M405 110L435 125L405 140" fill="#EC4899"/><rect x="450" y="40" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#DDD6C8" stroke-width="3"/><text x="485" y="95" fill="#18181B" font-family="JetBrains Mono, monospace" font-size="22" font-weight="700">Ralph Loop</text><text x="485" y="130" fill="#3F3F46" font-family="IBM Plex Sans, sans-serif" font-size="18">fresh context + filesystem memory</text><text x="485" y="158" fill="#3F3F46" font-family="IBM Plex Sans, sans-serif" font-size="18">+ 검증 분리</text><path d="M770 125H880" stroke="#18181B" stroke-width="6" stroke-linecap="round"/><path d="M865 110L895 125L865 140" fill="#18181B"/><rect x="910" y="70" width="250" height="110" rx="18" fill="#EC4899"/><text x="940" y="115" fill="#FFFFFF" font-family="IBM Plex Sans, sans-serif" font-size="22" font-weight="700">반복 가능한 장기 작업</text><text x="940" y="150" fill="#FFF1F7" font-family="IBM Plex Sans, sans-serif" font-size="18">작게 맡기고, 다시 읽고, 검증</text><text x="70" y="300" fill="#3F3F46" font-family="IBM Plex Sans, sans-serif" font-size="18">핵심: 오래 기억하게 하는 게 아니라, 매 반복을 의도적으로 새로 시작하게 만든다.</text></svg>