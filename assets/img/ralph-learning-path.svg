<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none"><rect width="1200" height="360" rx="24" fill="#FFFDF7"/><g font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#18181B"><text x="55" y="90">1. 개념</text><text x="285" y="90">2. fresh context</text><text x="555" y="90">3. filesystem memory</text><text x="865" y="90">4. verify</text><text x="1045" y="90">5. proof</text></g><g font-family="IBM Plex Sans, sans-serif" font-size="16" fill="#3F3F46"><text x="55" y="125">왜 긴 세션이 망가지는가</text><text x="285" y="125">무엇을 기억하지 않을지</text><text x="555" y="125">상태를 파일에 남기는 법</text><text x="865" y="125">완료 주장을 누가 판정하나</text><text x="1045" y="125">rlp-desk로 구현 보기</text></g><path d="M180 170H250" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/><path d="M245 156L270 170L245 184" fill="#EC4899"/><path d="M470 170H540" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/><path d="M535 156L560 170L535 184" fill="#EC4899"/><path d="M805 170H855" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/><path d="M850 156L875 170L850 184" fill="#EC4899"/><path d="M1000 170H1030" stroke="#EC4899" stroke-width="5" stroke-linecap="round"/><path d="M1025 156L1050 170L1025 184" fill="#EC4899"/><rect x="40" y="200" width="1090" height="90" rx="18" fill="#FFFFFF" stroke="#DDD6C8" stroke-width="3"/><text x="65" y="252" fill="#18181B" font-family="IBM Plex Sans, sans-serif" font-size="20" font-weight="700">이 순서를 건너뛰면 Ralph Loop는 밈처럼 보이고, 이 순서를 따르면 운영 철학과 구현 proof로 읽힌다.</text></svg>