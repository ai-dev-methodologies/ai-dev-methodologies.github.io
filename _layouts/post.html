---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">ARTICLE</p>
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.date | date: "%Y-%m-%d" }}</div>
    {% if page.tags %}
    <ul class="tag-list">
      {% for tag in page.tags %}
      <li>{{ tag }}</li>
      {% endfor %}
    </ul>
    {% endif %}
  </header>
  {% if page.description %}
  <section class="lede-box">
    <p>{{ page.description }}</p>
  </section>
  {% endif %}
  <section class="post-body">
    {{ content }}
  </section>
</article>
