<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="author" content="{{ page.author | default: site.author | default: 'kyjin' }}">
    {% assign meta_description = page.description | default: site.description %}
    {% if meta_description %}
    <meta name="description" content="{{ meta_description | escape }}">
    {% endif %}
    {% if page.tags %}
    <meta name="keywords" content="{{ page.tags | join: ', ' | escape }}">
    {% endif %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    {% if page.layout == 'post' %}
    <meta property="og:type" content="article">
    {% for tag in page.tags %}
    <meta property="article:tag" content="{{ tag | escape }}">
    {% endfor %}
    {% else %}
    <meta property="og:type" content="website">
    {% endif %}
    <meta property="og:locale" content="ko_KR">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">ai-dev-methodologies</a>
      <nav>
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
      </nav>
    </header>
    <main class="content">
      {{ content }}
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const currentHost = window.location.host;
        document.querySelectorAll("a[href]").forEach((link) => {
          try {
            const url = new URL(link.href, window.location.origin);
            if (url.host && url.host !== currentHost) {
              link.setAttribute("target", "_blank");
              link.setAttribute("rel", "noopener noreferrer");
            }
          } catch (_) {}
        });

        document.querySelectorAll(".post-body pre").forEach((pre) => {
          if (pre.dataset.enhanced === "true") return;
          pre.dataset.enhanced = "true";

          const wrapper = document.createElement("div");
          wrapper.className = "code-shell";
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          const button = document.createElement("button");
          button.className = "copy-button";
          button.type = "button";
          button.setAttribute("aria-label", "Copy code");
          button.textContent = "Copy";
          wrapper.appendChild(button);

          button.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(pre.innerText);
              button.textContent = "Copied";
            } catch (_) {
              button.textContent = "Failed";
            }

            setTimeout(() => {
              button.textContent = "Copy";
            }, 1600);
          });
        });
      });
    </script>
  </body>
</html>
